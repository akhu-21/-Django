<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 80%;
            margin: auto;
            margin-top: 40px;
            display: flex;
            gap: 20px;
        }

        .form-section, .summary-section {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 50%;
        }

        h2 {
            margin-bottom: 20px;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: black;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .total {
            font-size: 20px;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">

    <!-- Billing Details -->
    <div class="form-section">
        <h2>Billing Details</h2>

        <form>
            <input type="text" placeholder="Full Name" required>
            <input type="email" placeholder="Email Address" required>
            <input type="text" placeholder="Phone Number" required>
            <textarea placeholder="Address" required></textarea>
            <input type="text" placeholder="City" required>
            <input type="text" placeholder="ZIP Code" required>

            <h3>Payment Method</h3>
            <input type="radio" name="payment" checked> Cash on Delivery<br><br>
            <input type="radio" name="payment"> Credit/Debit Card<br><br>

            <button class="btn">Place Order</button>
        </form>
    </div>

    <!-- Order Summary -->
    <div class="summary-section">
        <h2>Order Summary</h2>

        <div class="summary-item">
            <span>Product 1 x1</span>
            <span>₹500</span>
        </div>

        <div class="summary-item">
            <span>Product 2 x2</span>
            <span>₹600</span>
        </div>

        <hr>

        <div class="total">
            Total: ₹1100
        </div>
    </div>

</div>

</body>
</html>
