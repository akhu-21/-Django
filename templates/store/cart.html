 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shopping Cart</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 80%;
            margin: auto;
            margin-top: 40px;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        h2 {
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table th, table td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        img {
            width: 60px;
        }

        .btn {
            padding: 5px 10px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        .btn-remove {
            background-color: red;
            color: white;
        }

        .btn-update {
            background-color: green;
            color: white;
        }

        .total {
            text-align: right;
            font-size: 20px;
            margin-top: 20px;
        }

        .checkout {
            display: flex;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .checkout button {
            padding: 10px 20px;
            background: black;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Your Cart</h2>

    <table>
        <tr>
            <th>Product</th>
            <th>Name</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Total</th>
            <th>Action</th>
        </tr>

        <tr>
            <td><img src="https://via.placeholder.com/60"></td>
            <td>Product 1</td>
            <td>₹500</td>
            <td>
                <input type="number" value="1" min="1" onchange="updateTotal()">
            </td>
            <td class="item-total">₹500</td>
            <td>
                <button class="btn btn-remove" onclick="removeItem(this)">Remove</button>
            </td>
        </tr>

        <tr>
            <td><img src="https://via.placeholder.com/60"></td>
            <td>Product 2</td>
            <td>₹300</td>
            <td>
                <input type="number" value="2" min="1" onchange="updateTotal()">
            </td>
            <td class="item-total">₹600</td>
            <td>
                <button class="btn btn-remove" onclick="removeItem(this)">Remove</button>
            </td>
        </tr>
    </table>

    <div class="total">
        Grand Total: ₹<span id="grand-total">1100</span>
    </div>

    <div class="checkout">
        <button>Proceed to Checkout</button>
    </div>
</div>

<script>
    function updateTotal() {
        let rows = document.querySelectorAll("table tr");
        let grandTotal = 0;

        rows.forEach((row, index) => {
            if (index === 0) return;

            let price = parseInt(row.cells[2].innerText.replace('₹', ''));
            let quantity = row.cells[3].querySelector("input").value;
            let total = price * quantity;

            row.querySelector(".item-total").innerText = "₹" + total;
            grandTotal += total;
        });

        document.getElementById("grand-total").innerText = grandTotal;
    }

    function removeItem(button) {
        let row = button.parentElement.parentElement;
        row.remove();
        updateTotal();
    }
</script>

</body>
</html>
