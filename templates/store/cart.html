<!-- {% load static %} -->
<link rel="stylesheet" href="{% static 'css/main.css'%}">
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shopping Cart</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 80%;
            margin: 40px auto;
            background: #fff;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        table th, table td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        .total {
            text-align: right;
            margin-top: 20px;
            font-size: 18px;
        }

        .btn {
            padding: 10px 15px;
            background: #28a745;
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-danger {
            background: #dc3545;
        }

        .btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Your Cart</h2>

    <table id="cartTable">
        <thead>
            <tr>
                <th>Product</th>
                <th>Price (₹)</th>
                <th>Quantity</th>
                <th>Total (₹)</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Product 1</td>
                <td class="price">500</td>
                <td>
                    <input type="number" value="1" min="1" class="qty" onchange="updateTotal()">
                </td>
                <td class="itemTotal">500</td>
                <td><button class="btn btn-danger" onclick="removeItem(this)">Remove</button></td>
            </tr>

            <tr>
                <td>Product 2</td>
                <td class="price">300</td>
                <td>
                    <input type="number" value="2" min="1" class="qty" onchange="updateTotal()">
                </td>
                <td class="itemTotal">600</td>
                <td><button class="btn btn-danger" onclick="removeItem(this)">Remove</button></td>
            </tr>
        </tbody>
    </table>

    <div class="total">
        <strong>Grand Total: ₹ <span id="grandTotal">1100</span></strong>
    </div>

    <button class="btn" onclick="checkout()">Proceed to Checkout</button>
</div>

<script>
    function updateTotal() {
        let table = document.getElementById("cartTable");
        let grandTotal = 0;

        for (let i = 1; i < table.rows.length; i++) {
            let price = table.rows[i].querySelector(".price").innerText;
            let qty = table.rows[i].querySelector(".qty").value;
            let total = price * qty;

            table.rows[i].querySelector(".itemTotal").innerText = total;
            grandTotal += total;
        }

        document.getElementById("grandTotal").innerText = grandTotal;
    }

    function removeItem(button) {
        let row = button.parentElement.parentElement;
        row.remove();
        updateTotal();
    }

    function checkout() {
        alert("Proceeding to Checkout...");
    }
</script>

</body>
</html>
