<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f5f5f5;
        }

        header {
            background-color: #333;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .product-card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: center;
        }

        .product-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
        }

        .product-name {
            font-size: 18px;
            margin: 10px 0;
        }

        .price {
            color: green;
            font-size: 16px;
            margin-bottom: 10px;
        }

        .btn {
            background-color: #28a745;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

<header>
    <h1>Our Products</h1>
</header>

<div class="container">

    <!-- Product 1 -->
    <div class="product-card">
        <img src="https://via.placeholder.com/250" alt="Product">
        <div class="product-name">Smartphone</div>
        <div class="price">₹15,000</div>
        <button class="btn">Add to Cart</button>
    </div>

    <!-- Product 2 -->
    <div class="product-card">
        <img src="https://via.placeholder.com/250" alt="Product">
        <div class="product-name">Headphones</div>
        <div class="price">₹2,000</div>
        <button class="btn">Add to Cart</button>
    </div>

    <!-- Product 3 -->
    <div class="product-card">
        <img src="https://via.placeholder.com/250" alt="Product">
        <div class="product-name">Laptop</div>
        <div class="price">₹50,000</div>
        <button class="btn">Add to Cart</button>
    </div>

    <!-- Product 4 -->
    <div class="product-card">
        <img src="https://via.placeholder.com/250" alt="Product">
        <div class="product-name">Shoes</div>
        <div class="price">₹3,000</div>
        <button class="btn">Add to Cart</button>
    </div>

</div>

</body>
</html>
